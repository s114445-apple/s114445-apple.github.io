<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<title>Spring into action</title>

<link rel="icon" href="icon.png">

<style>

body{
    text-align:center;
    font-family:sans-serif;
    background:#f8f5ef;
    padding-top:20px;
}

h1{
    font-size:32px;
}

input{
    font-size:24px;
    padding:8px;
    width:240px;
    text-align:center;
}

#wheel-container{
    width:320px;
    margin:30px auto;
    position:relative;
}

#pointer{
    width:0;
    height:0;

    border-left:20px solid transparent;
    border-right:20px solid transparent;
    border-top:40px solid #444;

    margin:0 auto -5px auto;
    z-index:10;
    position:relative;
}

#wheel{
    border-radius:50%;
    border:5px solid #444;
    transition:transform 3s ease-out;
}

button{

    margin-top:20px;

    padding:12px 24px;

    font-size:20px;

    border:none;

    border-radius:10px;

    background:#d98585;

    color:white;

    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

/* 結果視窗 */

#resultPopup{

    display:none;

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.6);

    z-index:9998;
}

#resultContent{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    background:white;

    padding:30px;

    border-radius:20px;

    min-width:300px;

    font-size:24px;
}

/* 警告視窗 */

#warningPopup{

    display:none;

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.8);

    z-index:9999;
}

#warningContent{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    background:red;

    color:white;

    padding:40px;

    border-radius:20px;

    font-size:36px;

    font-weight:bold;

    animation:flash 0.3s infinite;

}

@keyframes flash{

    0%{opacity:1;}
    50%{opacity:0.3;}
    100%{opacity:1;}

}

</style>
</head>

<body>

<h1>
我該...
<input
type="text"
id="userQuestion"
placeholder="輸入想做的事">
嗎？
</h1>

<div id="wheel-container">

<div id="pointer"></div>

<canvas
id="wheel"
width="300"
height="300">
</canvas>

</div>

<button onclick="spin()">
開始轉
</button>

<!-- 結果 -->

<div id="resultPopup">

    <div id="resultContent">

        <div id="resultText"></div>

        <br>

        <button onclick="closeResult()">
        關閉
        </button>

    </div>

</div>

<!-- 警告 -->

<div id="warningPopup">

    <div id="warningContent">

        你已經拖很久了。<br><br>

        ✋👁️👁️🤚

    </div>

</div>

<script>

const canvas =
document.getElementById("wheel");

const ctx =
canvas.getContext("2d");

const options = [

"該","不急",
"該","不急",
"該","不急",
"該","不急"

];

let currentRotation = 0;

let consecutiveNotYet = 0;

let isSpinning = false;

/* 畫轉盤 */

function drawWheel(){

    const slices = 8;

    const angle =
    2 * Math.PI / slices;

    for(let i=0;i<slices;i++){

        ctx.beginPath();

        ctx.moveTo(
            150,
            150
        );

        ctx.arc(
            150,
            150,
            150,
            i * angle,
            (i+1) * angle
        );

        ctx.fillStyle =
        options[i] === "該"
        ? "#d98585"
        : "#e8d8b6";

        ctx.fill();

        ctx.stroke();

        ctx.save();

        ctx.translate(
            150,
            150
        );

        ctx.rotate(
            i * angle +
            angle/2
        );

        ctx.fillStyle =
        "#333";

        ctx.font =
        "24px sans-serif";

        ctx.fillText(
            options[i],
            90,
            10
        );

        ctx.restore();
    }
}

drawWheel();

/* 結果視窗 */

function showResult(text){

    document
    .getElementById(
        "resultText"
    )
    .innerHTML = text;

    document
    .getElementById(
        "resultPopup"
    )
    .style.display =
    "block";
}

function closeResult(){

    document
    .getElementById(
        "resultPopup"
    )
    .style.display =
    "none";
}

/* 轉盤 */

function spin(){

    if(isSpinning){
        return;
    }

    const question =

    document
    .getElementById(
        "userQuestion"
    )
    .value
    .trim();

    if(question===""){

        alert(
            "請先輸入問題"
        );

        return;
    }

    if(consecutiveNotYet >= 2){

        document
        .getElementById(
            "warningPopup"
        )
        .style.display =
        "block";

        setTimeout(()=>{

            document
            .getElementById(
                "warningPopup"
            )
            .style.display =
            "none";

        },3000);

        consecutiveNotYet = 0;

        return;
    }

    isSpinning = true;

    const spinDegrees =

        1800 +
        Math.random()*360;

    currentRotation +=
    spinDegrees;

    canvas.style.transform =
    `rotate(${currentRotation}deg)`;

    setTimeout(()=>{

        const normalized =

        (
            currentRotation % 360
            + 360
        ) % 360;

        const pointerAngle =

        (
            450 -
            normalized
        ) % 360;

        const index =

        Math.floor(
            pointerAngle / 45
        );

        const result =
        options[index];

        let message;

        if(result==="該"){

            consecutiveNotYet = 0;

            message =
            "趕快去^_^";

        }else{

            consecutiveNotYet++;

            message =
            "不急不急";
        }

        showResult(

            "我該 "

            +

            question

            +

            " 嗎？<br><br><b>"

            +

            message

            +

            "</b>"

        );

        isSpinning = false;

    },3000);
}

</script>

</body>
</html>
