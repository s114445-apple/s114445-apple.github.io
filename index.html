<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">

<title>Spring into action</title>

<link rel="icon" href="icon.png">

<style>

body{
    text-align:center;
    font-family:sans-serif;
    background:#f8f5ef;
    padding-top:20px;
}

h1{
    font-size:32px;
}

input{
    font-size:24px;
    padding:5px 10px;
    width:220px;
    text-align:center;
}

#wheel-container{
    position:relative;
    width:300px;
    margin:30px auto;
}

#pointer{
    width:0;
    height:0;

    border-left:20px solid transparent;
    border-right:20px solid transparent;
    border-top:40px solid #444;

    margin:0 auto -5px auto;

    position:relative;
    z-index:10;
}

#wheel{
    width:300px;
    height:300px;

    border-radius:50%;
    border:5px solid #444;

    transition:transform 3s ease-out;
}

button{

    margin-top:20px;

    padding:12px 24px;

    font-size:20px;

    cursor:pointer;

    border:none;

    border-radius:10px;

    background:#d98585;

    color:white;
}

/* 警告視窗 */

#warningPopup{

    display:none;

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.75);

    z-index:9999;
}

#warningContent{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    background:#ff2222;

    color:white;

    padding:40px;

    border-radius:20px;

    font-size:36px;

    font-weight:bold;

    text-align:center;

    animation:flash 0.3s infinite;
}

@keyframes flash{

    0%{
        opacity:1;
    }

    50%{
        opacity:0.3;
    }

    100%{
        opacity:1;
    }
}

</style>

</head>

<body>

<h1>

我該

<input
type="text"
id="userQuestion"
placeholder="輸入想做的事">

嗎？

</h1>

<div id="wheel-container">

<div id="pointer"></div>

<canvas
id="wheel"
width="300"
height="300">
</canvas>

</div>

<button onclick="spin()">
開始轉
</button>

<div id="warningPopup">

    <div id="warningContent">

        你已經拖很久了。<br><br>

        ✋👁️👁️🤚

    </div>

</div>

<script>

const canvas =
document.getElementById("wheel");

const ctx =
canvas.getContext("2d");

const options = [

"該","不急",
"該","不急",
"該","不急",
"該","不急"

];

function drawWheel(){

    const slices = 8;

    const angle =
    2*Math.PI/slices;

    for(let i=0;i<slices;i++){

        ctx.beginPath();

        ctx.moveTo(
            150,
            150
        );

        ctx.arc(
            150,
            150,
            150,
            i*angle,
            (i+1)*angle
        );

        ctx.fillStyle =
        options[i] === "該"
        ? "#d98585"
        : "#e8d8b6";

        ctx.fill();

        ctx.strokeStyle =
        "#444";

        ctx.stroke();

        ctx.save();

        ctx.translate(
            150,
            150
        );

        ctx.rotate(
            i*angle +
            angle/2
        );

        ctx.fillStyle =
        "#222";

        ctx.font =
        "24px sans-serif";

        ctx.fillText(
            options[i],
            90,
            10
        );

        ctx.restore();
    }
}

drawWheel();

let currentRotation = 0;

let consecutiveNotYet = 0;

function spin(){

    const question =
    document
    .getElementById(
        "userQuestion"
    )
    .value
    .trim();

    if(question===""){

        alert(
            "請先輸入問題"
        );

        return;
    }

    if(consecutiveNotYet >= 2){

        document
        .getElementById(
            "warningPopup"
        )
        .style.display =
        "block";

        setTimeout(()=>{

            document
            .getElementById(
                "warningPopup"
            )
            .style.display =
            "none";

        },3000);

        consecutiveNotYet = 0;

        return;
    }

    const result =
    Math.random()<0.5
    ? "該"
    : "不急";

    if(result==="不急"){

        consecutiveNotYet++;

    }else{

        consecutiveNotYet=0;
    }

    const positions=[];

    options.forEach(
        (value,index)=>{

        if(value===result){

            positions.push(
                index
            );

        }

    });

    const chosenIndex =
    positions[
        Math.floor(
            Math.random()
            *
            positions.length
        )
    ];

    const sliceAngle =
    360/8;

    const targetRotation =

        360*5 +

        (

            360

            -

            (

                chosenIndex

                *

                sliceAngle

            )

            -

            sliceAngle/2

        );

    currentRotation +=
    targetRotation;

    canvas.style.transform =
    `rotate(${currentRotation}deg)`;

    setTimeout(()=>{

        let message;

        if(result==="該"){

            message =
            "趕快去^_^";

        }else{

            message =
            "不急不急";
        }

        alert(

            "我該 "

            +

            question

            +

            " 嗎？\n\n"

            +

            message

        );

    },3100);
}

</script>

</body>
</html>
